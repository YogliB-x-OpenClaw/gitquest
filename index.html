<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitSound — Hear Your Repository</title>
    <meta
      name="description"
      content="Turn any GitHub repository's commit history into generative music. Enter a repo URL and hear your project as a unique algorithmic soundscape."
    />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />

    <!-- Early Theme Application (Prevent Flash) -->
    <script>
      (function () {
        try {
          var settings = JSON.parse(localStorage.getItem("gitquest:settings") || "{}");
          var pref = settings.colorTheme;
          var isDark =
            pref === "dark" ||
            (pref !== "light" && window.matchMedia("(prefers-color-scheme: dark)").matches);
          document.documentElement.setAttribute(
            "data-theme",
            isDark ? "gitquest-dark" : "gitquest-light",
          );
        } catch (e) {
          document.documentElement.setAttribute("data-theme", "gitquest-light");
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
